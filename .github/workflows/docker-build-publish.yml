name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
jobs:
  build:
    uses: ./.github/workflows/just-compile.yaml
    
  push-docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: ./dist

      - run: |
          mkdir -p dist/linux
          mv dist/build-output/cache_cat-x86_64-unknown-linux-musl dist/linux/amd64
          mv dist/build-output/cache_cat-aarch64-unknown-linux-musl dist/linux/arm64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set Docker tags
        id: docker_tags
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:nighty"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          elif [[ "${GITHUB_REF}" =~ ^refs/tags/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest"
              echo "ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${VERSION}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          else
            echo "Unsupported ref: ${GITHUB_REF}"
            exit 1
          fi
      - name: Build docker and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64, linux/arm64/v8
          tags: ${{ steps.docker_tags.outputs.tags }}
